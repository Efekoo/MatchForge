worker_processes auto;

events {
    # Varsayılan (512) 1000+ eşzamanlı oyuncuda yetmez; her istek upstream'e
    # ikinci bir bağlantı açtığı için bol tutuyoruz.
    worker_connections 8192;
}

http {
    keepalive_timeout 65;
    # Docker DNS "api" adı için tüm replika IP'lerini döner; nginx round-robin dağıtır.
    upstream api {
        server api:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api;

            # SignalR WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Uzun süreli WebSocket bağlantıları için
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
